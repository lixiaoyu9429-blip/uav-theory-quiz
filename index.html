<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>无人机驾驶员理论题库刷题</title>
  <style>
    :root {
      --bg: #f7f8fa;
      --surface: #ffffff;
      --surface-soft: #f1f5f4;
      --text: #202124;
      --muted: #626a73;
      --line: #dfe4ea;
      --teal: #0f766e;
      --teal-dark: #115e59;
      --blue: #2563eb;
      --amber: #b45309;
      --red: #be123c;
      --green-soft: #dcfce7;
      --red-soft: #ffe4e6;
      --amber-soft: #fef3c7;
      --shadow: 0 12px 30px rgba(17, 24, 39, 0.08);
      --header-height: 72px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
      padding: 0 12px;
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease, transform 0.15s ease;
      white-space: nowrap;
    }

    button:hover { border-color: #a8b3bf; }
    button:active { transform: translateY(1px); }
    button:disabled { cursor: not-allowed; opacity: 0.55; transform: none; }

    .app-header {
      position: sticky;
      top: 0;
      z-index: 20;
      height: var(--header-height);
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(14px);
    }

    .header-inner {
      width: min(1280px, 100%);
      margin: 0 auto;
      display: grid;
      grid-template-columns: minmax(260px, 1fr) minmax(360px, 560px);
      gap: 16px;
      align-items: center;
      height: 100%;
      padding: 8px 20px;
    }

    h1 {
      margin: 0 0 4px;
      font-size: 20px;
      line-height: 1.25;
      font-weight: 750;
      letter-spacing: 0;
    }

    .source-line {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }

    .stat {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      padding: 6px 10px;
    }

    .stat strong {
      display: block;
      font-size: 17px;
      line-height: 1.1;
      overflow-wrap: anywhere;
    }

    .stat span {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
    }

    .main {
      width: min(1280px, 100%);
      margin: 0 auto;
      height: calc(100vh - var(--header-height));
      display: grid;
      grid-template-columns: 306px minmax(0, 1fr);
      gap: 16px;
      align-items: stretch;
      overflow: hidden;
      padding: 10px 20px 12px;
    }

    .sidebar {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 12px;
      min-width: 0;
      min-height: 0;
      overflow: hidden;
    }

    .panel,
    .quiz {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .panel {
      padding: 12px;
    }

    .sidebar .panel:last-child {
      min-height: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
    }

    .panel-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .panel-title h2 {
      margin: 0;
      font-size: 15px;
      line-height: 1.2;
    }

    .panel-title span {
      color: var(--muted);
      font-size: 12px;
    }

    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 10px;
    }

    .mode-switch {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 10px;
    }

    .chip {
      min-height: 30px;
      padding: 0 10px;
      font-size: 14px;
    }

    .chip.active {
      border-color: var(--teal);
      background: #e6f4f1;
      color: var(--teal-dark);
      font-weight: 700;
    }

    .controls {
      display: grid;
      gap: 8px;
    }

    label.control {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
    }

    select,
    input {
      width: 100%;
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
      padding: 0 10px;
      outline: none;
    }

    select:focus,
    input:focus {
      border-color: var(--teal);
      box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.13);
    }

    .tool-row {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-top: 10px;
    }

    .tool-row button {
      min-width: 0;
      padding: 0 8px;
      font-size: 13px;
    }

    .danger {
      border-color: #fecdd3;
      color: var(--red);
    }

    .danger:hover {
      border-color: var(--red);
      background: var(--red-soft);
    }

    .nav-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 6px;
      min-height: 0;
      max-height: none;
      overflow: auto;
      padding-right: 2px;
    }

    .nav-btn {
      height: 34px;
      min-height: 34px;
      padding: 0;
      font-size: 13px;
      color: var(--muted);
    }

    .nav-btn.current {
      border-color: var(--teal);
      background: var(--teal);
      color: #fff;
      font-weight: 750;
    }

    .nav-btn.correct:not(.current) {
      border-color: #86efac;
      background: var(--green-soft);
      color: #166534;
    }

    .nav-btn.wrong:not(.current) {
      border-color: #fda4af;
      background: var(--red-soft);
      color: #9f1239;
    }

    .nav-btn.favorite:not(.current)::after {
      content: "";
      display: inline-block;
      width: 5px;
      height: 5px;
      margin-left: 3px;
      border-radius: 50%;
      background: var(--amber);
      vertical-align: middle;
    }

    .nav-btn.answered:not(.current) {
      border-color: #bfdbfe;
      background: #eff6ff;
      color: #1d4ed8;
    }

    .empty-list {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .quiz {
      min-width: 0;
      min-height: 0;
      height: 100%;
      padding: 18px 24px;
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr) auto auto auto;
      gap: 12px;
      overflow: hidden;
    }

    .quiz-top,
    .quiz-actions,
    .nav-actions,
    .answer-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .quiz-top {
      justify-content: space-between;
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      min-width: 0;
    }

    .badge {
      min-height: 28px;
      display: inline-flex;
      align-items: center;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: var(--surface-soft);
      padding: 0 9px;
      color: var(--muted);
      font-size: 13px;
      max-width: 100%;
      overflow-wrap: anywhere;
    }

    .badge.type { color: var(--teal-dark); background: #e6f4f1; border-color: #b7ded8; }
    .badge.wrong { color: #9f1239; background: var(--red-soft); border-color: #fecdd3; }
    .badge.done { color: #166534; background: var(--green-soft); border-color: #bbf7d0; }

    .favorite-button.active {
      border-color: #fcd34d;
      background: var(--amber-soft);
      color: #92400e;
      font-weight: 700;
    }

    .question {
      margin: 0;
      font-size: 20px;
      line-height: 1.48;
      font-weight: 720;
      overflow-wrap: anywhere;
      white-space: pre-line;
    }

    .option-list {
      display: grid;
      align-content: start;
      gap: 8px;
      min-height: 0;
      overflow: auto;
      padding-right: 2px;
    }

    .option {
      width: 100%;
      min-height: 48px;
      display: grid;
      grid-template-columns: 42px minmax(0, 1fr);
      align-items: stretch;
      padding: 0;
      text-align: left;
      overflow: hidden;
      background: #fbfcfd;
    }

    .option-key {
      display: grid;
      place-items: center;
      border-right: 1px solid var(--line);
      background: #f3f6f8;
      font-weight: 800;
      color: var(--muted);
    }

    .option-text {
      min-width: 0;
      padding: 10px 13px;
      line-height: 1.42;
      overflow-wrap: anywhere;
      white-space: pre-line;
    }

    .option.selected {
      border-color: var(--blue);
      background: #eff6ff;
    }

    .option.selected .option-key {
      background: #dbeafe;
      color: #1d4ed8;
    }

    .option.correct {
      border-color: #22c55e;
      background: var(--green-soft);
    }

    .option.correct .option-key {
      background: #bbf7d0;
      color: #166534;
    }

    .option.wrong {
      border-color: #fb7185;
      background: var(--red-soft);
    }

    .option.wrong .option-key {
      background: #fecdd3;
      color: #9f1239;
    }

    .result {
      display: none;
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 12px;
      line-height: 1.42;
      overflow-wrap: anywhere;
    }

    .result.show { display: block; }
    .result.good { border-color: #86efac; background: var(--green-soft); color: #166534; }
    .result.bad { border-color: #fda4af; background: var(--red-soft); color: #9f1239; }
    .result.neutral { border-color: #fcd34d; background: var(--amber-soft); color: #92400e; }

    .quiz-actions {
      justify-content: space-between;
      border-top: 1px solid var(--line);
      padding-top: 12px;
    }

    .primary {
      border-color: var(--teal);
      background: var(--teal);
      color: #fff;
      font-weight: 750;
      min-width: 96px;
    }

    .primary:hover {
      border-color: var(--teal-dark);
      background: var(--teal-dark);
    }

    .progress-strip {
      height: 7px;
      border-radius: 999px;
      background: #e8edf2;
      overflow: hidden;
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, var(--teal), #22c55e);
      transition: width 0.2s ease;
    }

    @media (max-width: 920px) {
      body {
        height: auto;
        min-height: 100vh;
        overflow: auto;
      }

      .app-header {
        height: auto;
      }

      .header-inner {
        grid-template-columns: 1fr;
        height: auto;
      }

      .main {
        grid-template-columns: 1fr;
        height: auto;
        overflow: visible;
      }

      .sidebar {
        overflow: visible;
      }

      .nav-grid {
        grid-template-columns: repeat(10, minmax(0, 1fr));
        max-height: 154px;
      }

      .quiz {
        height: auto;
        min-height: auto;
        overflow: visible;
      }

      .option-list {
        overflow: visible;
      }
    }

    @media (max-width: 620px) {
      .header-inner,
      .main {
        padding-left: 12px;
        padding-right: 12px;
      }

      .stats {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .tool-row {
        grid-template-columns: 1fr;
      }

      .nav-grid {
        grid-template-columns: repeat(6, minmax(0, 1fr));
      }

      .quiz {
        padding: 16px;
      }

      .question {
        font-size: 19px;
      }

      .quiz-actions {
        align-items: stretch;
      }

      .nav-actions,
      .answer-actions {
        width: 100%;
      }

      .nav-actions button,
      .answer-actions button {
        flex: 1 1 0;
      }
    }
  </style>
</head>
<body>
  <header class="app-header">
    <div class="header-inner">
      <div>
        <h1>无人机驾驶员理论题库</h1>
        <p class="source-line">2026 省部属工会复习题纲 · 500 题 · 生成时间：2026-06-20 11:01</p>
      </div>
      <div class="stats" aria-label="练习统计">
        <div class="stat"><strong id="statTotal">500</strong><span id="statTotalLabel">题目</span></div>
        <div class="stat"><strong id="statDone">0</strong><span id="statDoneLabel">已练</span></div>
        <div class="stat"><strong id="statAccuracy">0%</strong><span id="statAccuracyLabel">正确率</span></div>
        <div class="stat"><strong id="statWrong">0</strong><span id="statWrongLabel">错题</span></div>
      </div>
    </div>
  </header>

  <main class="main">
    <aside class="sidebar">
      <section class="panel">
        <div class="panel-title">
          <h2>练习范围</h2>
          <span id="scopeCount">500 题</span>
        </div>
        <div class="mode-switch" id="modeSwitch">
          <button class="chip active" data-mode="practice">练习模式</button>
          <button class="chip" data-mode="test">测试模式</button>
        </div>
        <div class="filters" id="filterTabs">
          <button class="chip active" data-filter="all">全部</button>
          <button class="chip" data-filter="single">单选</button>
          <button class="chip" data-filter="multiple">多选</button>
          <button class="chip" data-filter="judge">判断</button>
          <button class="chip" data-filter="wrong">错题</button>
          <button class="chip" data-filter="favorite">收藏</button>
        </div>
        <div class="controls">
          <label class="control">
            <span>排序</span>
            <select id="orderSelect">
              <option value="sequential">顺序</option>
              <option value="random">随机</option>
              <option value="unanswered">未练优先</option>
            </select>
          </label>
          <label class="control">
            <span>搜索</span>
            <input id="searchInput" type="search" placeholder="题干或选项关键词">
          </label>
        </div>
        <div class="tool-row">
          <button id="shuffleBtn">重新打乱</button>
          <button id="exportWrongBtn">导出错题</button>
          <button id="resetBtn" class="danger">清空记录</button>
        </div>
      </section>

      <section class="panel">
        <div class="panel-title">
          <h2>题目列表</h2>
          <span id="listCount">0/0</span>
        </div>
        <div class="nav-grid" id="navGrid"></div>
      </section>
    </aside>

    <section class="quiz" aria-live="polite">
      <div class="quiz-top">
        <div class="badges" id="badges"></div>
        <button id="favoriteBtn" class="favorite-button">收藏</button>
      </div>
      <p class="question" id="questionText"></p>
      <div class="option-list" id="optionList"></div>
      <div class="result" id="resultBox"></div>
      <div class="progress-strip" aria-hidden="true"><div class="progress-fill" id="progressFill"></div></div>
      <div class="quiz-actions">
        <div class="nav-actions">
          <button id="prevBtn">上一题</button>
          <button id="nextBtn">下一题</button>
        </div>
        <div class="answer-actions">
          <button id="revealBtn">看答案</button>
          <button id="submitBtn" class="primary">提交</button>
        </div>
      </div>
    </section>

,"text":"充沛的水汽"},{"key":"C","text":"闪电"},{"key":"D","text":"足够的冲击力"}],"answer":"ABD"},{"id":350,"type":"多选题","number":30,"question":"影响飞行的云主要包括________","options":[{"key":"A","text":"雨层云"},{"key":"B","text":"高积云"},{"key":"C","text":"积雨云"},{"key":"D","text":"层云"}],"answer":"ACD"},{"id":351,"type":"多选题","number":31,"question":"提升无人机飞行高度的方法有________","options":[{"key":"A","text":"增大机翼面积"},{"key":"B","text":"增大发动机的功率"},{"key":"C","text":"增大展弦比"},{"key":"D","text":"增大翼弦长度"}],"answer":"AB"},{"id":352,"type":"多选题","number":32,"question":"关于马赫数的描述正确的是________","options":[{"key":"A","text":"马赫数就是飞行速度"},{"key":"B","text":"马赫数是指飞行速度与当地声速的比值"},{"key":"C","text":"马赫数等于 1 时，对飞行最有利"},{"key":"D","text":"马赫数是个无量纲量，它的大小可以作为空气受到压缩程度的指标"}],"answer":"BD"},{"id":353,"type":"多选题","number":33,"question":"下面描述正确的有________","options":[{"key":"A","text":"气压是随着高度的增加而减小的，无人机越往高空飞行，飞行所获得的升力就越小"},{"key":"B","text":"空气密度变大，会导致无人机所受到的升力和阻力都会变大"},{"key":"C","text":"无人机动、静压孔积冰，会使速度表、高度表等一些重要驾驶仪表失效或者失真"},{"key":"D","text":"温度太低会导致飞机上的电子电气设备无法正常启动，还会导致液压油或燃油结冰"}],"answer":"ABCD"},{"id":354,"type":"多选题","number":34,"question":"减小诱导阻力的措施有________","options":[{"key":"A","text":"采用较小的机翼平面形状"},{"key":"B","text":"加大机翼的展弦比"},{"key":"C","text":"减小机翼的展弦比"},{"key":"D","text":"在机翼安装翼梢小翼"}],"answer":"ABD"},{"id":355,"type":"多选题","number":35,"question":"提高航程的办法________","options":[{"key":"A","text":"减小发动机的燃油消耗率"},{"key":"B","text":"增加飞机的最大升阻比"},{"key":"C","text":"减小飞机的结构重量"},{"key":"D","text":"安装副油箱"}],"answer":"ABCD"},{"id":356,"type":"多选题","number":36,"question":"关于风切变对低空飞行的影响，以下描述正确的是________","options":[{"key":"A","text":"顺风风切变会使空速增加"},{"key":"B","text":"逆风风切变会使空速减少"},{"key":"C","text":"侧风风切变会使无人机产生侧滑和倾斜"},{"key":"D","text":"垂直风切变会使无人机迎角变化"}],"answer":"CD"},{"id":357,"type":"多选题","number":37,"question":"不可见光指人肉眼看不到的光，例如________等。","options":[{"key":"A","text":"白光"},{"key":"B","text":"紫外线"},{"key":"C","text":"红外线"},{"key":"D","text":"远红外线"}],"answer":"BCD"},{"id":358,"type":"多选题","number":38,"question":"无人机航线一般可 _____组成。","options":[{"key":"A","text":"飞行控制席"},{"key":"B","text":"任务控制席"},{"key":"C","text":"信息处理席"},{"key":"D","text":"链路监控席"}],"answer":"ABCD"},{"id":367,"type":"多选题","number":47,"question":"无人机任务规划系统具有以下特点________。","options":[{"key":"A","text":"完全自主性"},{"key":"B","text":"准确性、完整性、一致性"},{"key":"C","text":"多无人机的协同性"},{"key":"D","text":"实时的重规划能力"}],"answer":"BCD"},{"id":368,"type":"多选题","number":48,"question":"数字地图比传统地图的应用更加广泛，并且在无人机任务规划系统中发挥重大作用，其\n原因在于数字地图具有以下特点：________。","options":[{"key":"A","text":"共享性"},{"key":"B","text":"动态性"},{"key":"C","text":"实时性"},{"key":"D","text":"选择性"},{"key":"E","text":"灵活性"}],"answer":"ABCDE"},{"id":369,"type":"多选题","number":49,"question":"飞行航线是指航空器预定的飞行路线。通常标志在航空地图上，有________。","options":[{"key":"A","text":"地标点"},{"key":"B","text":"起点"},{"key":"C","text":"检查点"},{"key":"D","text":"终点"}],"answer":"BCD"},{"id":370,"type":"多选题","number":50,"question":"等角航线一般比大圆航线的距离长，二者相差的距离与________有关。","options":[{"key":"A","text":"航线长度"},{"key":"B","text":"航线方向"},{"key":"C","text":"纬度、经度差"},{"key":"D","text":"航线角度"}],"answer":"ABC"},{"id":371,"type":"多选题","number":51,"question":"航路的评价一般应重点关注以下主要因素：________。","options":[{"key":"A","text":"完成指定任务的可能性"},{"key":"B","text":"航路总长度"},{"key":"C","text":"航路机动性"},{"key":"D","text":"被发现和损毁的风险"},{"key":"E","text":"与障碍物碰撞风险"}],"answer":"ABCDE"},{"id":372,"type":"多选题","number":52,"question":"无人机链路系统主要威胁来源有________。","options":[{"key":"A","text":"电磁干扰威胁"},{"key":"B","text":"信息截获威胁"},{"key":"C","text":"欺骗反制威胁"}],"answer":"ABC"},{"id":373,"type":"多选题","number":53,"question":"以下属于非消耗性任务载荷的有________。","options":[{"key":"A","text":"频率干扰系统"},{"key":"B","text":"照明弹"},{"key":"C","text":"激光测距仪"},{"key":"D","text":"无线电中继"}],"answer":"ACD"},{"id":374,"type":"多选题","number":54,"question":"以下属于传统电子围栏的是________。","options":[{"key":"A","text":"震动式电子围栏"},{"key":"B","text":"张力式电子围栏"},{"key":"C","text":"埋地式感应设备"},{"key":"D","text":"电子脉冲式电子围栏"}],"answer":"ABCD"},{"id":375,"type":"多选题","number":55,"question":"雷达具有________、感知距离远、抗干扰能力 人机降落方式。","options":[{"key":"A","text":"手接回收"},{"key":"B","text":"伞降回收"},{"key":"C","text":"火箭拦收"},{"key":"D","text":"气囊回收"}],"answer":"AC"},{"id":384,"type":"多选题","number":64,"question":"以下________属于固定翼无人机系统起飞方式。","options":[{"key":"A","text":"滑行起飞"},{"key":"B","text":"短距起飞"},{"key":"C","text":"垂直起飞"},{"key":"D","text":"零长发射起飞"}],"answer":"ABCD"},{"id":385,"type":"多选题","number":65,"question":"多旋翼无人机系统主要由多旋翼无人机、________、________和综合保障系统等四个核\n心部分构成。","options":[{"key":"A","text":"控制站"},{"key":"B","text":"摄像头"},{"key":"C","text":"任务载荷"},{"key":"D","text":"无线传输媒介"}],"answer":"AC"},{"id":386,"type":"多选题","number":66,"question":"以下________属于多旋翼无人机搭载的非消耗型任务载荷。","options":[{"key":"A","text":"高清监控设备"},{"key":"B","text":"激光雷达设备"},{"key":"C","text":"倾斜摄影设备"},{"key":"D","text":"植保设备"}],"answer":"ABC"},{"id":387,"type":"多选题","number":67,"question":"飞行控制系统，简称“飞控系统”，相当于无人机的“大脑”，主要包括________三大\n模块。","options":[{"key":"A","text":"飞控计算机"},{"key":"B","text":"遥控器"},{"key":"C","text":"传感器"},{"key":"D","text":"执行机构"}],"answer":"ACD"},{"id":388,"type":"多选题","number":68,"question":"链路系统的本质就是两个相互通信的电台。通过链路系统，无人机系统可以实现数据、\n图像等信息的发送和接收。常用的链路系统分为________。","options":[{"key":"A","text":"遥控上行链路"},{"key":"B","text":"数传链路"},{"key":"C","text":"图传下行链路"},{"key":"D","text":"数图一体的局域网链路"}],"answer":"ABCD"},{"id":389,"type":"多选题","number":69,"question":"飞控计算机的安装必须确保其三个轴向________的精度。","options":[{"key":"A","text":"高度"},{"key":"B","text":"俯仰"},{"key":"C","text":"滚转"},{"key":"D","text":"偏航"}],"answer":"BCD"},{"id":390,"type":"多选题","number":70,"question":"空速管安装位置一定要选在无人机外面气流受影响较小的位置，一般选择在________。","options":[{"key":"A","text":"机身正上方"},{"key":"B","text":"机头正前方"},{"key":"C","text":"垂尾"},{"key":"D","text":"翼尖方向"}],"answer":"BCD"},{"id":391,"type":"多选题","number":71,"question":"无人机保险主要涵盖以下________三个方面。","options":[{"key":"A","text":"无人机产品责任险"},{"key":"B","text":"无人机机身保险"},{"key":"C","text":"无人机第三者责任险"},{"key":"D","text":"无人机意外险"}],"answer":"ABC"},{"id":392,"type":"多选题","number":72,"question":"飞行控制系统，作为无人机系统中核心重要的子系统，在无人机的任务执行中，承担着\n诸如________等任务。","options":[{"key":"A","text":"数据采集处理"},{"key":"B","text":"飞行控制"},{"key":"C","text":"自动导航"},{"key":"D","text":"数据链路信息传输"}],"answer":"ABCD"},{"id":393,"type":"多选题","number":73,"question":"飞行控制软件的软件功能层主要包括为________。","options":[{"key":"A","text":"遥控遥测模块"},{"key":"B","text":"导航模块"},{"key":"C","text":"控制律模块"},{"key":"D","text":"调度管理模块"}],"answer":"ABCD"},{"id":394,"type":"多选题","number":74,"question":"地面控制站功能主要包括以下几个________方面。","options":[{"key":"A","text":"飞行状态的监测与控制"},{"key":"B","text":"地图导航与任务规划"},{"key":"C","text":"飞行数据的记录与回放"},{"key":"D","text":"模拟飞行"}],"answer":"ABCD"},{"id":395,"type":"多选题","number":75,"question":"无人机地面控制站有多种形式，按不同的使用要求可分为________。","options":[{"key":"A","text":"大型地面站"},{"key":"B","text":"便携式地面站"},{"key":"C","text":"空中中继站"},{"key":"D","text":"掌上微型地面站"}],"answer":"ABD"},{"id":396,"type":"多选题","number":76,"question":"无人机的一般用途包括________。","options":[{"key":"A","text":"用作靶机"},{"key":"B","text":"用作电子对抗"},{"key":"C","text":"用作地址勘查"},{"key":"D","text":"用作侦查"}],"answer":"ABCD"},{"id":397,"type":"多选题","number":77,"question":"无人机的三种操作模式有________。","options":[{"key":"A","text":"手动模式"},{"key":"B","text":"姿态模式"},{"key":"C","text":"AI 模式"},{"key":"D","text":"GPS/北斗模式"}],"answer":"ABD"},{"id":398,"type":"多选题","number":78,"question":"从物质形态来考虑，地球大气的主要成分主要包括________。","options":[{"key":"A","text":"干洁空气"},{"key":"B","text":"水汽"},{"key":"C","text":"二氧化碳"},{"key":"D","text":"大气杂质"}],"answer":"ABD"},{"id":399,"type":"多选题","number":79,"question":"根据《中国低空空域使用管理规定（试行）》，制定本规定的目的以下说法正确的有\n________：","options":[{"key":"A","text":"进一步推动我国低空空域管理改革"},{"key":"B","text":"规范低空空域管理"},{"key":"C","text":"提高空域资源利用率"},{"key":"D","text":"确保低空飞行安全顺畅和高效"}],"answer":"ABCD"},{"id":400,"type":"多选题","number":80,"question":"管制空域原则上只能划设在下列区域________：","options":[{"key":"A","text":"空中禁区和空中危险区；国境地带我方一侧 30 公里范围内；"},{"key":"B","text":"全国重点防空目标区和重点防空目标外围 5 公里区域；"},{"key":"C","text":"终端（进近）管制区；军用和民航运输机场的管制地带；"},{"key":"D","text":"其他需要重点保护地区。"}],"answer":"BCD"},{"id":401,"type":"判断题","number":1,"question":"视距内飞行的定义：高 120 米，半径 300 米。（ ）","options":[{"key":"A","text":"对"},{"key":"B","text":"错"}],"answer":"B"},{"id":402,"type":"判断题","number":2,"question":"空域管理的具体办法由民用航空局制定。（ ）","options":[{"key":"A","text":"对"},{"key":"B","text":"错"}],"answer":"B"},{"id":403,"type":"判断题","number":3,"question":"在一个划定的管制空域内，由军航和民航的各一个空中交通管制单位负责该空域内的航空\n器的空中交通管制。（ ）","options":[{"key":"A","text":"对"},{"key":"B","text":"错"}],"answer":"B"},{"id":404,"type":"判断题","number":4,"question":"关于民用航空器使用禁区的规定是按照国家规定经批准后方可飞入。（ ）","options":[{"key":"A","text":"对"},{"key":"B","text":"错"}],"answer":"A"},{"id":405,"type":"判断题","number":5,"question":"民用航空器的适航管理由国务院和中央军委负责。（ ）","options":[{"key":"A","text":"对"},{"key":"B","text":"错"}],"answer":"B"},{"id":406,"type":"判断题","number":6,"question":"无人机低空飞行为 100m——1000m。（ ）","options":[{"key":"A","text":"对"},{"key":"B","text":"错"}],"answer":"A"},{"id":407,"type":"判断题","number":7,"question":"根据低空空域分类划设原则，山区和高原地区可根据实际需要，经批准后可适当调整高度\n范围。（ ）","options":[{"key":"A","text":"对"},{"key":"B","text":"错"}],"answer":"A"},{"id":408,"type":"判断题","number":8,"question":"监视空域是指为飞行活动提供空中交通管制服务、飞行情报服务、航空气象服务、航空情\n报服务和告警服务的空域。（ ）","options":[{"key":"A","text":"对"},{"key":"B","text":"错"}],"answer":"B"},{"id":409,"type":"判断题","number":9,"question":"空域管理的具体办法由国务院和中央军事委员会制定。（ ）","options":[{"key":"A","text":"对"},{"key":"B","text":"错"}],"answer":"A"},{"id":410,"type":"判断题","number":10,"question":"颁发国内三个层次航空法规的部门是：全国人大常委会、国务院、中央军委、民航总局。\n（ ）","options":[{"key":"A","text":"对"},{"key":"B","text":"错"}],"answer":"A"},{"id":411,"type":"判断题","number":11,"question":"人口稠密区，是指城镇、村庄、繁忙道路或大型露天集会场所等区域。（ ）","options":[{"key":"A","text":"对"},{"key":"B","text":"错"}],"answer":"A"},{"id":412,"type":"判断题","number":12,"question":"民用航空器只能具有一国国籍。（ ）","options":[{"key":"A","text":"对"},{"key":"B","text":"错"}],"answer":"A"},{"id":413,"type":"判断题","number":13,"question":"民用航空适航管理是对设计、制造、使用和维修进行管理。（ ）","options":[{"key":"A","text":"对"},{"key":"B","text":"错"}],"answer":"A"},{"id":414,"type":"判断题","number":14,"question":"重点地区，是指军事重地、核电站和行政中心等关乎国家安全的区域及周边，或地方政\n府临时划设的区域。（ ）","options":[{"key":"A","text":"对"},{"key":"B","text":"错"}],"answer":"A"},{"id":415,"type":"判断题","number":15,"question":"中华人民共和国境内飞行管制由国务院、中央军委空中交通管制委员会统一组织实施，\n各有关飞行 管制部门按照各自的分工提供空中交通管制服务。（ ）","options":[{"key":"A","text":"对"},{"key":"B","text":"错"}],"answer":"B"},{"id":416,"type":"判断题","number":16,"question":"升力是和相对气流方向一致的。（ ）","options":[{"key":"A","text":"对"},{"key":"B","text":"错"}],"answer":"B"},{"id":417,"type":"判断题","number":17,"question":"诱导阻力的大小与机翼的升力和展弦比有很大的关系。升力越大，诱导阻力越大；展弦\n比越大， 诱导阻力越小。（ ）","options":[{"key":"A","text":"对"},{"key":"B","text":"错"}],"answer":"A"},{"id":418,"type":"判断题","number":18,"question":"物体的运动是各式各样的，平动是一种水平运动或者直线运动。（ ）","options":[{"key":"A","text":"对"},{"key":"B","text":"错"}],"answer":"B"},{"id":419,"type":"判断题","number":19,"question":"飞机的重力着力点，叫做飞机的压心。（ ）","options":[{"key":"A","text":"对"},{"key":"B","text":"错"}],"answer":"B"},{"id":420,"type":"判断题","number":20,"question":"飞机的平衡，是指作用在飞机各力之和为零，各力对重心所构成的各力矩之和也为零。\n（ ）","options":[{"key":"A","text":"对"},{"key":"B","text":"错"}],"answer":"A"},{"id":421,"type":"判断题","number":21,"question":"一个平飞速度对于着一个迎角。（ ）","options":[{"key":"A","text":"对"},{"key":"B","text":"错"}],"answer":"A"},{"id":422,"type":"判断题","number":22,"question":"对于横侧操纵而言，杆位对应的是坡度。（ ）","options":[{"key":"A","text":"对"},{"key":"B","text":"错"}],"answer":"B"},{"id":423,"type":"判断题","number":23,"question":"对于俯仰操纵而言，杆位对应的是迎角。（ ）","options":[{"key":"A","text":"对"},{"key":"B","text":"错"}],"answer":"A"},{"id":424,"type":"判断题","number":24,"question":"平飞需要拉力同升阻比成正比。（ ）","options":[{"key":"A","text":"对"},{"key":"B","text":"错"}],"answer":"A"},{"id":425,"type":"判断题","number":25,"question":"飞机作圆周运动，需要一个和运动方向相反的力，它不断改变物体运动的方向，而不改\n变物体运 动的线速度。（ ）","options":[{"key":"A","text":"对"},{"key":"B","text":"错"}],"answer":"B"},{"id":426,"type":"判断题","number":26,"question":"适当增加翼型的弯度是提高翼型升力系数和最大升力系数的有效手段，常用的相对弯度\n约为 2%-6%, 尤其 4%比较常见。（ ）","options":[{"key":"A","text":"对"},{"key":"B","text":"错"}],"answer":"A"},{"id":427,"type":"判断题","number":27,"question":"适当前移最大弯度位置也可以提高翼型的最大升力系数，失速形式为前缘失速。（ ）","options":[{"key":"A","text":"对"},{"key":"B","text":"错"}],"answer":"A"},{"id":428,"type":"判断题","number":28,"question":"最大弯度位置靠前，最大升力系数降低，但是可以取得比较缓和的失速特性。（ ）","options":[{"key":"A","text":"对"},{"key":"B","text":"错"}],"answer":"B"},{"id":429,"type":"判断题","number":29,"question":"上反角并不是越大越好，过大的上反角可能引起飞机含有偏航和滚转的重复侧向运动。\n（ ）","options":[{"key":"A","text":"对"},{"key":"B","text":"错"}],"answer":"A"},{"id":430,"type":"判断题","number":30,"question":"牛顿第一运动定律的定义是，在不受任何外力或所受外力之和为零的状态下，物体总是\n保持匀速 直线运动状态或静止状态。（ ）","options":[{"key":"A","text":"对"},{"key":"B","text":"错"}],"answer":"A"},{"id":431,"type":"判断题","number":31,"question":"牛顿第二定律也称为惯性定律。（ ）","options":[{"key":"A","text":"对"},{"key":"B","text":"错"}],"answer":"B"},{"id":432,"type":"判断题","number":32,"question":"牛顿第一定律并不是在所有的参照系里都成立，实际上它只在惯性参照系里才成立。因\n此常常把 牛顿第一定律是否成立，以一个参照系是否为惯性参照系作为判据。我们日常使\n用的地球坐标系就是一 个惯性参照系。（ ）","options":[{"key":"A","text":"对"},{"key":"B","text":"错"}],"answer":"A"},{"id":433,"type":"判断题","number":33,"question":"第二定律定性地描述了力作用的效果，定量地度量了物体的惯性大小。（ ）","options":[{"key":"A","text":"对"},{"key":"B","text":"错"}],"answer":"B"},{"id":434,"type":"判断题","number":34,"question":"物体之间的相互作用是通过力来体现的。有作用力必有反作用力。它们是作用在同一条\n直线上，大小相等，方向相反。（ ）","options":[{"key":"A","text":"对"},{"key":"B","text":"错"}],"answer":"A"},{"id":435,"type":"判断题","number":35,"question":"关于压力中心的位置要注意三个问题：①压力中心的位置和速度无关；②压力中心的位\n置和翼型 有关；③压力中心的位置通常和迎角有关(对称翼型除外)。（ ）","options":[{"key":"A","text":"对"},{"key":"B","text":"错"}],"answer":"A"},{"id":436,"type":"判断题","number":36,"question":"雷诺数越大，意味着粘性力影响越显著，雷诺数越小，意味着惯性力影响越显著。（ ）","options":[{"key":"A","text":"对"},{"key":"B","text":"错"}],"answer":"B"},{"id":437,"type":"判断题","number":37,"question":"总的来说，摩擦阻力的大小取决于空气的黏性、飞机的表面状况，以及与空气相接触的\n飞机的表面积。空气的黏性越大，飞机的表面越粗糙，飞机的表面积越大，摩擦阻力就越大。\n（ ）","options":[{"key":"A","text":"对"},{"key":"B","text":"错"}],"answer":"A"},{"id":438,"type":"判断题","number":38,"question":"使用电动机的无人机，动力电池的选择，需要根据飞机的大小购买，忌讳买过大，大容\n量的电池用在小机身，由于电池过重，会影响电机推进的效率，滞留时间反而不长。（ ）","options":[{"key":"A","text":"对"},{"key":"B","text":"错"}],"answer":"A"},{"id":439,"type":"判断题","number":39,"question":"跟升力系数一样，阻力系数是没有单位的系数，其数值是通过实验测定获得的。它们分\n别代表迎 角、机翼形状和飞机表面质量等因素对阻力的综合影响。同一架飞机，在飞行中，\n机翼形状和飞机表面 质量一般是不变的，这时，阻力系数主要由迎角的大小来确定。\n（ ）","options":[{"key":"A","text":"对"},{"key":"B","text":"错"}],"answer":"A"},{"id":440,"type":"判断题","number":40,"question":"所谓升阻比 (K), 就是在同一迎角下升力与阻力之比。升阻比也就是不同迎角下升力系\n数与阻力系数之比。（ ）","options":[{"key":"A","text":"对"},{"key":"B","text":"错"}],"answer":"B"},{"id":441,"type":"判断题","number":41,"question":"无刷电机电压的输入与电机空载转速遵循严格的线性比例 。（ ）","options":[{"key":"A","text":"对"},{"key":"B","text":"错"}],"answer":"A"},{"id":442,"type":"判断题","number":42,"question":"动力电池的主要作用为无人机提供动力驱动 。（ ）","options":[{"key":"A","text":"对"},{"key":"B","text":"错"}],"answer":"A"},{"id":443,"type":"判断题","number":43,"question":"飞控系统承担数据采集处理，飞行控制，自动导航，数据链路信息传输等任务 。（ ）","options":[{"key":"A","text":"对"},{"key":"B","text":"错"}],"answer":"A"},{"id":444,"type":"判断题","number":44,"question":"无人机任务规划是指根据无人机需要完成的任务、无人机的数量以及携带任务载荷的类\n型，对无 人机制定飞行路线并进行任务分配。（ ）","options":[{"key":"A","text":"对"},{"key":"B","text":"错"}],"answer":"A"},{"id":445,"type":"判断题","number":45,"question":"飞机平飞遇垂直向上突风作用时升力将增大。（ ）","options":[{"key":"A","text":"对"},{"key":"B","text":"错"}],"answer":"A"},{"id":446,"type":"判断题","number":46,"question":"飞机的最大起飞重量指飞机开始起飞滑跑时的重量。（ ）","options":[{"key":"A","text":"对"},{"key":"B","text":"错"}],"answer":"A"},{"id":447,"type":"判断题","number":47,"question":"飞机的横侧安定性过强，而方向安定性相对过弱，飞机容易出现风摆(荷兰滚)。（ ）","options":[{"key":"A","text":"对"},{"key":"B","text":"错"}],"answer":"A"},{"id":448,"type":"判断题","number":48,"question":"飞机的方向安定性过强，而横侧安定性相对过弱，飞机容易出现螺旋不稳定现象。\n（ ）","options":[{"key":"A","text":"对"},{"key":"B","text":"错"}],"answer":"A"},{"id":449,"type":"判断题","number":49,"question":"飞机的横侧安定性有助于使机翼恢复到水平状态。（ ）","options":[{"key":"A","text":"对"},{"key":"B","text":"错"}],"answer":"A"},{"id":450,"type":"判断题","number":50,"question":"重心靠后，飞机的纵向安定性减弱。（ ）","options":[{"key":"A","text":"对"},{"key":"B","text":"错"}],"answer":"A"},{"id":451,"type":"判断题","number":51,"question":"小型固定翼飞机的主要部件包括机体、起落架和动力装置 。（ ）","options":[{"key":"A","text":"对"},{"key":"B","text":"错"}],"answer":"A"},{"id":452,"type":"判断题","number":52,"question":"机翼的主要功能是维持飞行稳定 。（ ）","options":[{"key":"A","text":"对"},{"key":"B","text":"错"}],"answer":"B"},{"id":453,"type":"判断题","number":53,"question":"副翼的主要功能是操纵飞机围绕纵轴进行横向活动 。（ ）","options":[{"key":"A","text":"对"},{"key":"B","text":"错"}],"answer":"A"},{"id":454,"type":"判断题","number":54,"question":"机翼的主要功能是控制飞机的俯仰和方向平衡，操纵飞机围绕横轴和纵轴进行俯仰和方\n向运动。（ ）","options":[{"key":"A","text":"对"},{"key":"B","text":"错"}],"answer":"B"},{"id":455,"type":"判断题","number":55,"question":"尾翼分为水平尾翼和方向舵 。（ ）","options":[{"key":"A","text":"对"},{"key":"B","text":"错"}],"answer":"B"},{"id":456,"type":"判断题","number":56,"question":"小型无人机的起降装置可分为前三点和后三点 。（ ）","options":[{"key":"A","text":"对"},{"key":"B","text":"错"}],"answer":"B"},{"id":457,"type":"判断题","number":57,"question":"翼型是机翼的剖面形状 。（ ）","options":[{"key":"A","text":"对"},{"key":"B","text":"错"}],"answer":"B"},{"id":458,"type":"判断题","number":58,"question":"水平尾翼包括水平安定面和方向舵 。（ ）","options":[{"key":"A","text":"对"},{"key":"B","text":"错"}],"answer":"B"},{"id":459,"type":"判断题","number":59,"question":"翼型前缘的曲率半径称为前缘半径 。（ ）","options":[{"key":"A","text":"对"},{"key":"B","text":"错"}],"answer":"A"},{"id":460,"type":"判断题","number":60,"question":"翼型弯度的位置与翼型的升力系数无关 。（ ）","options":[{"key":"A","text":"对"},{"key":"B","text":"错"}],"answer":"B"},{"id":461,"type":"判断题","number":61,"question":"无人机如长期不用，应定期启动，检查设备状态。如有异常现象，应及时调整、维修。\n（ ）","options":[{"key":"A","text":"对"},{"key":"B","text":"错"}],"answer":"A"},{"id":462,"type":"判断题","number":62,"question":"固定翼模型飞机机翼的平面几何形状有矩形、梯形、椭圆形、三角形以及这些形状的组\n合型等。（ ）","options":[{"key":"A","text":"对"},{"key":"B","text":"错"}],"answer":"A"},{"id":463,"type":"判断题","number":63,"question":"飞行高度层应当根据航向或航路走向、航空器性能、飞行区域以及航线的地形、天气等\n配置。（ ）","options":[{"key":"A","text":"对"},{"key":"B","text":"错"}],"answer":"B"},{"id":464,"type":"判断题","number":64,"question":"飞行的组织与实施包括飞行预先准备、飞行直接准备、飞行实施和飞行讲评四个阶段。\n（ ）","options":[{"key":"A","text":"对"},{"key":"B","text":"错"}],"answer":"A"},{"id":465,"type":"判断题","number":65,"question":"申请飞行计划通常应当于飞行前一 日 17 时前向空中交通管制部门提出申请，并通知有\n关单位。（ ）","options":[{"key":"A","text":"对"},{"key":"B","text":"错"}],"answer":"B"},{"id":466,"type":"判断题","number":66,"question":"由于无人机飞行过程中无执行任务机长，为了保证飞行安全，由地面站操控人员承担规\n定的机长权利和责任。（ ）","options":[{"key":"A","text":"对"},{"key":"B","text":"错"}],"answer":"A"},{"id":467,"type":"判断题","number":67,"question":"升阻比随迎角的改变而改变。（ ）","options":[{"key":"A","text":"对"},{"key":"B","text":"错"}],"answer":"A"},{"id":468,"type":"判断题","number":68,"question":"划设无人驾驶航空器飞行空域应当遵循统筹配置、安全高效原则，以融合飞行为主，兼\n顾隔离飞行需求，充分考虑飞行安全和公众利益。（ ）","options":[{"key":"A","text":"对"},{"key":"B","text":"错"}],"answer":"B"},{"id":469,"type":"判断题","number":69,"question":"警察、海关、应急管理部门辖有的无人机适航、登记等事项的管理办法，由民航局另行\n制定。（ ）","options":[{"key":"A","text":"对"},{"key":"B","text":"错"}],"answer":"B"},{"id":470,"type":"判断题","number":70,"question":"气团变性的快慢随气团原有的属性而异。 一般冷气团移至温暖地区变性较慢，而暖气团\n移至寒冷地 区，则变性较快。（ ）","options":[{"key":"A","text":"对"},{"key":"B","text":"错"}],"answer":"B"},{"id":471,"type":"判断题","number":71,"question":"一个平衡系统具有安定性的条件是具有安定力矩的作用。（ ）","options":[{"key":"A","text":"对"},{"key":"B","text":"错"}],"answer":"A"},{"id":472,"type":"判断题","number":72,"question":"侧滑是相对气流方向与飞机纵轴不一致的飞行状态。（ ）","options":[{"key":"A","text":"对"},{"key":"B","text":"错"}],"answer":"B"},{"id":473,"type":"判断题","number":73,"question":"精细巡检一般采用固定翼无人机巡检系统进行。（ ）","options":[{"key":"A","text":"对"},{"key":"B","text":"错"}],"answer":"B"},{"id":474,"type":"判断题","number":74,"question":"飞机平飞遇垂直向上突风作用时阻力将增大。（ ）","options":[{"key":"A","text":"对"},{"key":"B","text":"错"}],"answer":"B"},{"id":475,"type":"判断题","number":75,"question":"电调的英文缩写为 ESC。（ ）","options":[{"key":"A","text":"对"},{"key":"B","text":"错"}],"answer":"A"},{"id":476," 对线路运行都没有影响。（ ）","options":[{"key":"A","text":"对"},{"key":"B","text":"错"}],"answer":"B"},{"id":490,"type":"判断题","number":90,"question":"作业前，无人机应预先设置紧急情况下的安全策略。（ ）","options":[{"key":"A","text":"对"},{"key":"B","text":"错"}],"answer":"A"},{"id":491,"type":"判断题","number":91,"question":"气体的密度与温度成反比。（ ）","options":[{"key":"A","text":"对"},{"key":"B","text":"错"}],"answer":"A"},{"id":492,"type":"判断题","number":92,"question":"空气的密度与压力成正比。（ ）","options":[{"key":"A","text":"对"},{"key":"B","text":"错"}],"answer":"A"},{"id":493,"type":"判断题","number":93,"question":"流体的伯努利定律适用于不可压缩的粘性流体。（ ）","options":[{"key":"A","text":"对"},{"key":"B","text":"错"}],"answer":"B"},{"id":494,"type":"判断题","number":94,"question":"当无人驾驶航空器的迎角为临界迎角时航程最远。（ ）","options":[{"key":"A","text":"对"},{"key":"B","text":"错"}],"answer":"B"},{"id":495,"type":"判断题","number":95,"question":"国际标准大气压值是 100kPa。（ ）","options":[{"key":"A","text":"对"},{"key":"B","text":"错"}],"answer":"B"},{"id":496,"type":"判断题","number":96,"question":"任务载荷分系统由任务设备和地面显控单元组成。（ ）","options":[{"key":"A","text":"对"},{"key":"B","text":"错"}],"answer":"A"},{"id":497,"type":"判断题","number":97,"question":"使飞机绕横轴产生侧倾的力矩称为俯仰力矩。（ ）","options":[{"key":"A","text":"对"},{"key":"B","text":"错"}],"answer":"A"},{"id":498,"type":"判断题","number":98,"question":"使飞机绕立轴产生侧倾的力矩称为转向力矩。（ ）","options":[{"key":"A","text":"对"},{"key":"B","text":"错"}],"answer":"B"},{"id":499,"type":"判断题","number":99,"question":"在滑翔状态下，较大的下滑角会导致形成一个较大的重力分量。（ ）","options":[{"key":"A","text":"对"},{"key":"B","text":"错"}],"answer":"A"},{"id":500,"type":"判断题","number":100,"question":"地面操作人员对无人驾驶航空器飞行状态以及飞行航迹的操作和规划信息，可以通过地\n面控制站传输到数传电台进而发射给无人驾驶航空器。（ ）","options":[{"key":"A","text":"对"},{"key":"B","text":"错"}],"answer":"A"}]</script>
  <script>
    const QUESTIONS = JSON.parse(document.getElementById('question-data').textContent);
    const STORE_KEY = 'uav-theory-quiz-2026-v1';
    const filters = {
      all: () => true,
      single: q => q.type === '单选题',
      multiple: q => q.type === '多选题',
      judge: q => q.type === '判断题',
      wrong: q => Boolean(records[q.id] && records[q.id].attempts > 0 && !records[q.id].lastCorrect),
      favorite: q => Boolean(favorites[q.id])
    };

    let saved = {};
    try { saved = JSON.parse(localStorage.getItem(STORE_KEY) || '{}'); } catch (error) { saved = {}; }

    let records = saved.records || {};
    let favorites = saved.favorites || {};
    let autoAdvanceTimer = null;
    const TEST_ADVANCE_DELAY = 260;
    let state = {
      mode: saved.mode === 'test' ? 'test' : 'practice',
      filter: 'all',
      order: 'sequential',
      search: '',
      currentId: QUESTIONS[0].id,
      drafts: {},
      revealed: {},
      testSubmitted: false,
      testSummary: null,
      randomIds: shuffle(QUESTIONS.map(q => q.id))
    };

    const els = {
      statTotal: document.getElementById('statTotal'),
      statDone: document.getElementById('statDone'),
      statAccuracy: document.getElementById('statAccuracy'),
      statWrong: document.getElementById('statWrong'),
      statTotalLabel: document.getElementById('statTotalLabel'),
      statDoneLabel: document.getElementById('statDoneLabel'),
      statAccuracyLabel: document.getElementById('statAccuracyLabel'),
      statWrongLabel: document.getElementById('statWrongLabel'),
      modeSwitch: document.getElementById('modeSwitch'),
      scopeCount: document.getElementById('scopeCount'),
      filterTabs: document.getElementById('filterTabs'),
      orderSelect: document.getElementById('orderSelect'),
      searchInput: document.getElementById('searchInput'),
      shuffleBtn: document.getElementById('shuffleBtn'),
      exportWrongBtn: document.getElementById('exportWrongBtn'),
      resetBtn: document.getElementById('resetBtn'),
      navGrid: document.getElementById('navGrid'),
      listCount: document.getElementById('listCount'),
      badges: document.getElementById('badges'),
      favoriteBtn: document.getElementById('favoriteBtn'),
      questionText: document.getElementById('questionText'),
      optionList: document.getElementById('optionList'),
      resultBox: document.getElementById('resultBox'),
      progressFill: document.getElementById('progressFill'),
      prevBtn: document.getElementById('prevBtn'),
      nextBtn: document.getElementById('nextBtn'),
      revealBtn: document.getElementById('revealBtn'),
      submitBtn: document.getElementById('submitBtn')
    };

    function shuffle(items) {
      const copy = items.slice();
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function persist() {
      localStorage.setItem(STORE_KEY, JSON.stringify({ records, favorites, mode: state.mode }));
    }

    function answerOf(keys) {
      return keys.slice().sort().join('');
    }

    function typeShort(q) {
      if (q.type === '单选题') return '单选';
      if (q.type === '多选题') return '多选';
      return '判断';
    }

    function getQuestion(id) {
      return QUESTIONS.find(q => q.id === id) || QUESTIONS[0];
    }

    function questionSearchText(q) {
      return [q.question, ...q.options.map(o => o.key + '.' + o.text)].join('\n').toLowerCase();
    }

    function filteredList() {
      const search = state.search.trim().toLowerCase();
      let list = QUESTIONS.filter(q => filters[state.filter](q));
      if (search) list = list.filter(q => questionSearchText(q).includes(search));

      if (state.order === 'random') {
        const rank = new Map(state.randomIds.map((id, index) => [id, index]));
        list = list.slice().sort((a, b) => rank.get(a.id) - rank.get(b.id));
      } else if (state.order === 'unanswered') {
        list = list.slice().sort((a, b) => {
          const aDone = records[a.id] && records[a.id].attempts > 0 ? 1 : 0;
          const bDone = records[b.id] && records[b.id].attempts > 0 ? 1 : 0;
          return aDone - bDone || a.id - b.id;
        });
      } else {
        list = list.slice().sort((a, b) => a.id - b.id);
      }
      return list;
    }

    function ensureCurrent(list) {
      if (!list.length) {
        state.currentId = null;
        return;
      }
      if (!list.some(q => q.id === state.currentId)) {
        state.currentId = list[0].id;
      }
    }

    function currentIndex(list) {
      return list.findIndex(q => q.id === state.currentId);
    }

    function renderStats(list) {
      if (state.mode === 'test') {
        const total = list.length;
        const answered = list.filter(q => (state.drafts[q.id] || []).length > 0).length;
        const summary = state.testSummary;
        els.statTotal.textContent = total;
        els.statDone.textContent = summary ? summary.answered : answered;
        els.statAccuracy.textContent = summary ? summary.accuracy + '%' : '待交卷';
        els.statWrong.textContent = summary ? summary.wrong : total - answered;
        els.statTotalLabel.textContent = '测试题';
        els.statDoneLabel.textContent = '已答';
        els.statAccuracyLabel.textContent = '正确率';
        els.statWrongLabel.textContent = summary ? '错误' : '未答';
        return;
      }
      const total = QUESTIONS.length;
      const attempted = QUESTIONS.filter(q => records[q.id] && records[q.id].attempts > 0).length;
      const correct = QUESTIONS.filter(q => records[q.id] && records[q.id].attempts > 0 && records[q.id].lastCorrect).length;
      const wrong = QUESTIONS.filter(q => records[q.id] && records[q.id].attempts > 0 && !records[q.id].lastCorrect).length;
      els.statTotal.textContent = total;
      els.statDone.textContent = attempted;
      els.statAccuracy.textContent = attempted ? Math.round(correct / attempted * 100) + '%' : '0%';
      els.statWrong.textContent = wrong;
      els.statTotalLabel.textContent = '题目';
      els.statDoneLabel.textContent = '已练';
      els.statAccuracyLabel.textContent = '正确率';
      els.statWrongLabel.textContent = '错题';
    }

    function renderMode() {
      [...els.modeSwitch.querySelectorAll('button')].forEach(btn => {
        btn.classList.toggle('active', btn.dataset.mode === state.mode);
      });
    }

    function renderFilters(list) {
      [...els.filterTabs.querySelectorAll('button')].forEach(btn => {
        btn.classList.toggle('active', btn.dataset.filter === state.filter);
      });
      els.scopeCount.textContent = list.length + ' 题';
    }

    function renderNav(list) {
      const index = currentIndex(list);
      els.listCount.textContent = list.length ? (index + 1) + '/' + list.length : '0/0';
      els.navGrid.innerHTML = '';
      if (!list.length) {
        const empty = document.createElement('p');
        empty.className = 'empty-list';
        empty.textContent = '没有匹配的题目';
        els.navGrid.appendChild(empty);
        return;
      }
      const frag = document.createDocumentFragment();
      list.forEach((q, i) => {
        const btn = document.createElement('button');
        btn.className = 'nav-btn';
        btn.textContent = q.id;
        btn.title = typeShort(q) + '第 ' + q.number + ' 题';
        if (q.id === state.currentId) btn.classList.add('current');
        if (favorites[q.id]) btn.classList.add('favorite');
        const record = records[q.id];
        const answeredInTest = (state.drafts[q.id] || []).length > 0;
        if (state.mode === 'test') {
          if (!state.testSubmitted) {
            if (answeredInTest) btn.classList.add('answered');
          } else if (state.revealed[q.id]) {
            btn.classList.add(state.revealed[q.id].correct ? 'correct' : 'wrong');
          }
        } else if (record && record.attempts > 0) {
          btn.classList.add(record.lastCorrect ? 'correct' : 'wrong');
        }
        btn.addEventListener('click', () => {
          cancelAutoAdvance();
          state.currentId = q.id;
          render();
        });
        frag.appendChild(btn);
      });
      els.navGrid.appendChild(frag);
    }

    function renderQuestion(q, list) {
      if (!q) {
        els.badges.innerHTML = '';
        els.favoriteBtn.disabled = true;
        els.questionText.textContent = '没有匹配的题目';
        els.optionList.innerHTML = '';
        els.resultBox.className = 'result';
        els.resultBox.textContent = '';
        els.progressFill.style.width = '0%';
        els.prevBtn.disabled = true;
        els.nextBtn.disabled = true;
        els.revealBtn.disabled = true;
        els.submitBtn.disabled = true;
        return;
      }

      const index = currentIndex(list);
      const record = records[q.id];
      const reveal = state.revealed[q.id];
      const selected = state.drafts[q.id] || [];
      const progress = list.length ? ((index + 1) / list.length * 100) : 0;
      const answeredInTest = selected.length > 0;

      els.badges.innerHTML = '';
      [
        { text: typeShort(q) + '第 ' + q.number + ' 题', cls: 'type' },
        { text: '总第 ' + q.id + ' 题', cls: '' },
        { text: state.mode === 'test' ? '测试模式' : '练习模式', cls: '' },
        state.mode === 'test' && !state.testSubmitted ? { text: answeredInTest ? '已答' : '未答', cls: answeredInTest ? 'done' : '' } : null,
        state.mode === 'test' && state.testSubmitted && reveal ? { text: reveal.correct ? '本题正确' : '本题错误', cls: reveal.correct ? 'done' : 'wrong' } : null,
        state.mode === 'practice' && record && record.attempts > 0 ? { text: record.lastCorrect ? '上次正确' : '上次错误', cls: record.lastCorrect ? 'done' : 'wrong' } : null,
        state.mode === 'practice' && record && record.attempts > 0 ? { text: '练过 ' + record.attempts + ' 次', cls: '' } : null
      ].filter(Boolean).forEach(item => {
        const span = document.createElement('span');
        span.className = 'badge ' + item.cls;
        span.textContent = item.text;
        els.badges.appendChild(span);
      });

      els.favoriteBtn.disabled = false;
      els.favoriteBtn.classList.toggle('active', Boolean(favorites[q.id]));
      els.favoriteBtn.textContent = favorites[q.id] ? '已收藏' : '收藏';
      els.questionText.textContent = q.question;
      els.optionList.innerHTML = '';

      const correctKeys = q.answer.split('');
      q.options.forEach(option => {
        const btn = document.createElement('button');
        btn.className = 'option';
        btn.type = 'button';
        const chosen = selected.includes(option.key);
        if (chosen) btn.classList.add('selected');
        if (reveal) {
          const isCorrect = correctKeys.includes(option.key);
          if (isCorrect) btn.classList.add('correct');
          if (chosen && !isCorrect) btn.classList.add('wrong');
        }
        btn.innerHTML = '<span class="option-key"></span><span class="option-text"></span>';
        btn.querySelector('.option-key').textContent = option.key;
        btn.querySelector('.option-text').textContent = option.text;
        btn.addEventListener('click', () => toggleOption(q, option.key));
        els.optionList.appendChild(btn);
      });

      renderResult(q, reveal);
      els.progressFill.style.width = progress + '%';
      els.prevBtn.disabled = index <= 0;
      els.nextBtn.disabled = index < 0 || index >= list.length - 1;
      els.revealBtn.style.display = state.mode === 'test' ? 'none' : '';
      els.revealBtn.disabled = state.mode === 'test';
      els.submitBtn.textContent = state.mode === 'test' ? (state.testSubmitted ? '重新测试' : '交卷') : '判题';
      els.submitBtn.disabled = false;
    }

    function renderResult(q, reveal) {
      els.resultBox.className = 'result';
      els.resultBox.textContent = '';
      if (state.mode === 'test') {
        if (!state.testSummary) return;
        const summary = state.testSummary;
        els.resultBox.classList.add('show');
        els.resultBox.classList.add(summary.accuracy >= 80 ? 'good' : summary.accuracy >= 60 ? 'neutral' : 'bad');
        els.resultBox.textContent = '本次测试：已答 ' + summary.answered + '/' + summary.total + '，正确 ' + summary.correct + '，错误 ' + summary.wrong + '，正确率 ' + summary.accuracy + '%。';
        return;
      }
      if (!reveal) return;
      els.resultBox.classList.add('show');
      if (reveal.kind === 'answer') {
        els.resultBox.classList.add('neutral');
        els.resultBox.textContent = '参考答案：' + q.answer;
        return;
      }
      if (reveal.correct) {
        els.resultBox.classList.add('good');
        els.resultBox.textContent = '答对了。答案：' + q.answer;
      } else {
        els.resultBox.classList.add('bad');
        els.resultBox.textContent = '答错了。正确答案：' + q.answer + '；你的答案：' + (reveal.answer || '未选择');
      }
    }

    function render() {
      const list = filteredList();
      ensureCurrent(list);
      const q = state.currentId ? getQuestion(state.currentId) : null;
      renderStats(list);
      renderMode();
      renderFilters(list);
      renderNav(list);
      renderQuestion(q, list);
    }

    function cancelAutoAdvance() {
      if (!autoAdvanceTimer) return;
      clearTimeout(autoAdvanceTimer);
      autoAdvanceTimer = null;
    }

    function nextQuestionAfter(questionId) {
      const list = filteredList();
      const index = list.findIndex(q => q.id === questionId);
      return index >= 0 ? list[index + 1] : null;
    }

    function scheduleAutoAdvance(fromId, toId) {
      cancelAutoAdvance();
      if (!toId) return;
      autoAdvanceTimer = setTimeout(() => {
        autoAdvanceTimer = null;
        if (state.currentId !== fromId) return;
        state.currentId = toId;
        render();
      }, TEST_ADVANCE_DELAY);
    }

    function recordAnswer(q, answer, correct) {
      const prior = records[q.id] || { attempts: 0, correct: 0, wrong: 0 };
      records[q.id] = {
        attempts: prior.attempts + 1,
        correct: prior.correct + (correct ? 1 : 0),
        wrong: prior.wrong + (correct ? 0 : 1),
        lastAnswer: answer,
        lastCorrect: correct,
        updatedAt: new Date().toISOString()
      };
    }

    function gradePracticeAnswer(q, selected) {
      const answer = answerOf(selected);
      const priorReveal = state.revealed[q.id];
      if (priorReveal && priorReveal.kind === 'submit' && priorReveal.answer === answer) return;
      const correct = answer === q.answer;
      recordAnswer(q, answer, correct);
      state.revealed[q.id] = { kind: 'submit', answer, correct };
      persist();
    }

    function resetTestSession() {
      cancelAutoAdvance();
      state.drafts = {};
      state.revealed = {};
      state.testSubmitted = false;
      state.testSummary = null;
      const list = filteredList();
      state.currentId = list.length ? list[0].id : null;
      persist();
      render();
    }

    function submitTest() {
      cancelAutoAdvance();
      const list = filteredList();
      let answered = 0;
      let correctCount = 0;
      state.revealed = {};

      list.forEach(q => {
        const selected = state.drafts[q.id] || [];
        if (!selected.length) return;
        const answer = answerOf(selected);
        const correct = answer === q.answer;
        answered += 1;
        correctCount += correct ? 1 : 0;
        recordAnswer(q, answer, correct);
        state.revealed[q.id] = { kind: 'submit', answer, correct };
      });

      state.testSubmitted = true;
      state.testSummary = {
        total: list.length,
        answered,
        correct: correctCount,
        wrong: answered - correctCount,
        accuracy: answered ? Math.round(correctCount / answered * 100) : 0
      };
      persist();
      render();
    }

    function toggleOption(q, key) {
      cancelAutoAdvance();
      if (state.mode === 'test' && state.testSubmitted) return;
      if (state.mode === 'practice' && state.revealed[q.id]) {
        delete state.revealed[q.id];
      }
      const selected = new Set(state.drafts[q.id] || []);
      const multi = q.type === '多选题' || q.answer.length > 1;
      if (multi) {
        selected.has(key) ? selected.delete(key) : selected.add(key);
        state.drafts[q.id] = [...selected].sort();
      } else {
        state.drafts[q.id] = [key];
      }

      const currentSelected = state.drafts[q.id] || [];
      if (state.mode === 'practice') {
        if (!multi || currentSelected.length >= q.answer.length) {
          gradePracticeAnswer(q, currentSelected);
        }
        render();
        return;
      }

      render();
      if (!multi) {
        const nextQuestion = nextQuestionAfter(q.id);
        scheduleAutoAdvance(q.id, nextQuestion && nextQuestion.id);
      }
    }

    function submitCurrent() {
      if (!state.currentId) return;
      if (state.mode === 'test') {
        state.testSubmitted ? resetTestSession() : submitTest();
        return;
      }
      const q = getQuestion(state.currentId);
      const selected = state.drafts[q.id] || [];
      if (!selected.length) {
        cancelAutoAdvance();
        state.revealed[q.id] = { kind: 'submit', answer: '', correct: false };
        render();
        return;
      }
      gradePracticeAnswer(q, selected);
      render();
    }

    function revealCurrent() {
      if (!state.currentId) return;
      if (state.mode === 'test') return;
      cancelAutoAdvance();
      const q = getQuestion(state.currentId);
      state.revealed[q.id] = { kind: 'answer' };
      render();
    }

    function move(delta) {
      cancelAutoAdvance();
      const list = filteredList();
      const index = currentIndex(list);
      const next = list[index + delta];
      if (next) {
        state.currentId = next.id;
        render();
      }
    }

    function setMode(mode) {
      if (state.mode === mode) return;
      cancelAutoAdvance();
      state.mode = mode;
      state.drafts = {};
      state.revealed = {};
      state.testSubmitted = false;
      state.testSummary = null;
      const list = filteredList();
      state.currentId = list.length ? list[0].id : null;
      persist();
      render();
    }

    function exportWrong() {
      const wrong = QUESTIONS.filter(q => records[q.id] && records[q.id].attempts > 0 && !records[q.id].lastCorrect);
      if (!wrong.length) return;
      const text = wrong.map(q => {
        const opts = q.options.map(o => o.key + '. ' + o.text).join('\n');
        const last = records[q.id] && records[q.id].lastAnswer ? records[q.id].lastAnswer : '未记录';
        return '[' + typeShort(q) + ' ' + q.number + ' / 总第 ' + q.id + ' 题]\n' + q.question + '\n' + opts + '\n答案：' + q.answer + '\n上次选择：' + last;
      }).join('\n\n');
      const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = '无人机驾驶员理论错题.txt';
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    els.modeSwitch.addEventListener('click', event => {
      const btn = event.target.closest('button[data-mode]');
      if (!btn) return;
      setMode(btn.dataset.mode);
    });

    els.filterTabs.addEventListener('click', event => {
      const btn = event.target.closest('button[data-filter]');
      if (!btn) return;
      cancelAutoAdvance();
      state.testSubmitted = false;
      state.testSummary = null;
      state.revealed = {};
      state.filter = btn.dataset.filter;
      render();
    });

    els.orderSelect.addEventListener('change', event => {
      cancelAutoAdvance();
      state.testSubmitted = false;
      state.testSummary = null;
      state.revealed = {};
      state.order = event.target.value;
      if (state.order === 'random') state.randomIds = shuffle(QUESTIONS.map(q => q.id));
      render();
    });

    els.searchInput.addEventListener('input', event => {
      cancelAutoAdvance();
      state.testSubmitted = false;
      state.testSummary = null;
      state.revealed = {};
      state.search = event.target.value;
      render();
    });

    els.shuffleBtn.addEventListener('click', () => {
      cancelAutoAdvance();
      state.testSubmitted = false;
      state.testSummary = null;
      state.revealed = {};
      state.order = 'random';
      els.orderSelect.value = 'random';
      state.randomIds = shuffle(QUESTIONS.map(q => q.id));
      render();
    });

    els.exportWrongBtn.addEventListener('click', exportWrong);

    els.resetBtn.addEventListener('click', () => {
      if (!confirm('清空所有练习记录？')) return;
      cancelAutoAdvance();
      records = {};
      favorites = {};
      state.drafts = {};
      state.revealed = {};
      state.testSubmitted = false;
      state.testSummary = null;
      persist();
      render();
    });

    els.favoriteBtn.addEventListener('click', () => {
      if (!state.currentId) return;
      if (favorites[state.currentId]) delete favorites[state.currentId];
      else favorites[state.currentId] = true;
      persist();
      render();
    });

    els.prevBtn.addEventListener('click', () => move(-1));
    els.nextBtn.addEventListener('click', () => move(1));
    els.revealBtn.addEventListener('click', revealCurrent);
    els.submitBtn.addEventListener('click', submitCurrent);

    document.addEventListener('keydown', event => {
      if (event.target.matches('input, select, textarea')) return;
      if (event.key === 'ArrowLeft') move(-1);
      if (event.key === 'ArrowRight') move(1);
      if (event.key === 'Enter') submitCurrent();
      const q = state.currentId ? getQuestion(state.currentId) : null;
      if (!q) return;
      const key = event.key.toUpperCase();
      if (/^[A-F]$/.test(key) && q.options.some(o => o.key === key)) toggleOption(q, key);
    });

    render();
  </script>
</body>
</html>
